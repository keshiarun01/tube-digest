version: 2

sources:
  - name: raw
    database: TUBE_DIGEST
    schema: RAW
    description: "Raw data loaded from Cloudflare R2 via the Python ingestion layer"
    tables:
      - name: transcripts
        description: "Raw YouTube transcript segments, one row per timestamped segment"
        columns:
          - name: video_id
            description: "YouTube video ID (11-character string)"
            tests:
              - not_null
          - name: segment_index
            description: "Zero-indexed segment order within the video"
            tests:
              - not_null
          - name: text
            description: "Raw transcript text for this segment"
            tests:
              - not_null
          - name: start_time
            description: "Segment start time in seconds from video start"
            tests:
              - not_null
          - name: duration
            description: "Segment duration in seconds"
          - name: video_title
            description: "Video title from YouTube oEmbed metadata"
          - name: channel
            description: "YouTube channel name"
          - name: language
            description: "Transcript language code (e.g. 'en')"
          - name: is_auto_generated
            description: "True if transcript was auto-generated by YouTube"
          - name: loaded_at
            description: "Timestamp when row was inserted into Snowflake"
          - name: raw_metadata
            description: "JSON string of full video metadata — parsed in staging"