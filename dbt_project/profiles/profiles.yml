dbt_project:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'SYSADMIN') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'TUBE_DIGEST') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      schema: ANALYTICS
      threads: 4
      client_session_keep_alive: False
outbreaklens_dbt:
  outputs:
    dev:
      dbname: outbreaklens_db
      host: user
      pass: admin123
      port: 5432
      schema: outbreaklens_schema
      threads: 1
      type: postgres
      user: admin
  target: dev
