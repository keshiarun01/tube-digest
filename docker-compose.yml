version: '3.8'

services:
  tubedigest:
    build: .
    container_name: tube-digest-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app          # Live reload during development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
